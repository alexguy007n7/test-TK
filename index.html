<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SoliCAN Soli SCAN</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>

body{
font-family:Arial;
background:#050505;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
color:#00ffcc;
text-shadow:0 0 10px #00ffcc;
}

.container{
display:flex;
gap:20px;
}

.panel{
background:#111;
border:1px solid #00ffcc33;
padding:20px;
border-radius:12px;
flex:1;
box-shadow:0 0 15px #00ffcc22;
}

video{
width:100%;
border-radius:10px;
}

#preview{
width:100%;
margin-top:10px;
border-radius:10px;
}

button{
padding:12px;
border:none;
border-radius:8px;
background:#00ffcc;
color:black;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#00ffaa;
}

#hasil{
margin-top:15px;
background:#000;
padding:15px;
border-radius:8px;
word-break:break-all;
border:1px solid #00ffcc33;
}

a{
color:#00ffcc;
}

/* scan line effect */

.scanline{
position:absolute;
height:3px;
width:100%;
background:#00ffcc;
animation:scan 2s linear infinite;
}

@keyframes scan{
0%{transform:translateY(0)}
100%{transform:translateY(300px)}
}

/* HP layout */

@media (max-width:768px){

.container{
flex-direction:column;
}

button{
width:100%;
font-size:16px;
}

}

</style>
</head>

<body>

<h1>SoliCAN</h1>

<div class="container">

<div class="panel">

<h3>Scan Kamera</h3>

<button onclick="startCamera()">Aktifkan Kamera</button>

<div style="position:relative">
<video id="video"></video>
<div class="scanline"></div>
</div>

</div>

<div class="panel">

<h3>Upload Barcode</h3>

<input type="file" id="fileInput" accept="image/*">

<img id="preview">

<div id="hasil">Belum ada hasil</div>

</div>

</div>

<audio id="beep">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>

const codeReader = new ZXing.BrowserMultiFormatReader();
const video = document.getElementById("video");
const hasil = document.getElementById("hasil");
const beep = document.getElementById("beep");

function tampilkan(text){

beep.play();

hasil.innerHTML =
"Link ditemukan:<br><a href='"+text+"' target='_blank'>"+text+"</a>";

}

/* kamera */

function startCamera(){

codeReader.decodeFromVideoDevice(null, video, (result, err)=>{

if(result){
tampilkan(result.text);
}

});

}

/* upload */

document.getElementById("fileInput").addEventListener("change", function(e){

const file = e.target.files[0];
if(!file) return;

const preview = document.getElementById("preview");
preview.src = URL.createObjectURL(file);

const reader = new FileReader();

reader.onload = function(){

codeReader.decodeFromImage(undefined, reader.result)
.then(result => {

tampilkan(result.text);

})
.catch(() => {

hasil.innerText="Barcode tidak terbaca";

});

};

reader.readAsDataURL(file);

});

</script>

</body>
</html>
