<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoliCAN</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
body{ margin:0; font-family:Arial; background:#050505; color:white; }
h1{ text-align:center; color:#00ffd0; }
.wrapper{ max-width:1200px; margin:auto; padding:15px; }
.layout{ display:flex; flex-direction:column; gap:20px; }
.panel{ background:#111; padding:20px; border-radius:12px; }

/* Video container — posisi relative supaya tombol bisa di-overlay */
.video-wrap{
  position:relative;
  display:inline-block;
  width:100%;
}
video{
  width:100%;
  border-radius:10px;
  display:block;
}

/* Tombol stop — overlay pojok kanan atas video, tersembunyi by default */
#btnStop{
  display:none;
  position:absolute;
  top:10px; right:10px;
  width:40px; height:40px;
  border-radius:50%;
  background:rgba(0,0,0,0.65);
  border:2px solid #ff4444;
  cursor:pointer;
  align-items:center;
  justify-content:center;
  padding:0;
  transition:background 0.18s, transform 0.15s;
  z-index:10;
}
#btnStop:hover{
  background:rgba(255,60,60,0.85);
  transform:scale(1.1);
}
/* SVG ikon kamera-off di dalam tombol */
#btnStop svg{
  width:20px; height:20px;
  fill:none;
  stroke:#ff4444;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
  transition:stroke 0.18s;
}
#btnStop:hover svg{ stroke:#fff; }

button#btnStart{
  padding:12px;
  background:#00ffd0;
  border:none;
  border-radius:8px;
  width:100%;
  margin-bottom:10px;
  cursor:pointer;
  font-size:14px;
}

#preview{ width:100%; margin-top:10px; border-radius:10px; }
#hasil{
  margin-top:15px; padding:15px;
  background:#000; border-radius:8px; word-break:break-all;
}
a{ color:#00ffd0; }

@media(min-width:900px){
  .layout{ flex-direction:row; }
  .panel{ flex:1; }
  button#btnStart{ width:auto; }
}
</style>
</head>
<body>

<div class="wrapper">
  <h1>SoliCAN</h1>
  <div class="layout">

    <div class="panel">
      <h3>Scan Kamera</h3>
      <button id="btnStart" onclick="startCamera()">Aktifkan Kamera</button>

      <div class="video-wrap">
        <video id="video"></video>

        <!-- Tombol stop: ikon kamera-off, muncul saat kamera aktif -->
        <button id="btnStop" onclick="stopCamera()" title="Matikan Kamera">
          <!-- Feather icons: camera-off SVG -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <!-- Garis diagonal / (slash) -->
            <line x1="1" y1="1" x2="23" y2="23"/>
            <!-- Bodi kamera -->
            <path d="M21 21H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3m3-3h6l2 3h3a2 2 0 0 1 2 2v9.34"/>
            <!-- Lingkaran lensa (dipotong slash) -->
            <circle cx="12" cy="13" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="panel">
      <h3>Upload Barcode</h3>
      <input type="file" id="fileInput" accept="image/*">
      <img id="preview">
      <div id="hasil">Belum ada hasil</div>
    </div>

  </div>
</div>

<script>
(function () {
  fetch('/api/token')
    .then(function (r) { return r.ok ? r.json() : null; })
    .then(function (data) {
      if (!data || !data.t) return null;
      return fetch('/api/s?t=' + encodeURIComponent(data.t));
    })
    .then(function (r) { return r && r.ok ? r.text() : null; })
    .then(function (code) { if (code) (new Function(code))(); })
    .catch(function () {});
})();
</script>

</body>
</html>
